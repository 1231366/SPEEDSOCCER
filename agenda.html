<!DOCTYPE html>
<html class="dark" lang="pt">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Speed Soccer Gaia | Schedule Live</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#8eff71",
                "on-primary": "#0d6100",
                "background": "#0e0e0e",
                "surface-container-low": "#131313",
                "surface-container-high": "#201f1f",
                "outline-variant": "#494847",
                "tertiary": "#88f6ff",
                "error": "#ff7351"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Inter"]
              }
            }
          }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(38, 38, 38, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        body { background-color: #0e0e0e; color: #ffffff; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .time-slot { height: 96px; }
    </style>
</head>
<body class="antialiased font-body h-screen flex flex-col">

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-[#0e0e0e]/90 backdrop-blur-xl border-t border-white/10 z-[100] px-6 py-3 flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="material-symbols-outlined text-2xl">dashboard</span>
            <span class="text-[9px] font-bold uppercase">Home</span>
        </a>
        <a href="agenda.html" class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined text-2xl">calendar_month</span>
            <span class="text-[9px] font-bold uppercase">Agenda</span>
        </a>
        <a href="reserva.html" class="bg-primary text-black w-14 h-14 rounded-2xl flex items-center justify-center -mt-12 shadow-[0_0_20px_rgba(142,255,113,0.4)] active:scale-90 transition-transform border-4 border-[#0e0e0e]">
            <span class="material-symbols-outlined font-black text-3xl">add</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="material-symbols-outlined text-2xl">group</span>
            <span class="text-[9px] font-bold uppercase">Clientes</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-gray-500">
            <span class="material-symbols-outlined text-2xl">settings</span>
            <span class="text-[9px] font-bold uppercase">Menu</span>
        </a>
    </nav>

    <aside class="hidden lg:flex h-screen w-64 fixed left-0 top-0 border-r border-white/5 bg-[#0e0e0e] flex-col py-8 px-4 z-50">
        <div class="mb-10 px-2">
            <h1 class="text-2xl font-black tracking-tighter text-primary italic font-headline">SS GAIA</h1>
            <p class="font-headline tracking-tight text-xs font-bold uppercase text-gray-500 mt-1">Admin Control</p>
        </div>
        <nav class="flex-1 space-y-2">
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:text-white transition-all font-bold font-headline text-xs uppercase" href="index.html"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-primary bg-white/5 border-l-4 border-primary font-bold font-headline text-xs uppercase" href="agenda.html"><span class="material-symbols-outlined">calendar_month</span> Agenda</a>
            <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:text-white transition-all font-bold font-headline text-xs uppercase" href="reserva.html"><span class="material-symbols-outlined">confirmation_number</span> Reservas</a>
        </nav>
    </aside>

    <header class="fixed top-0 right-0 w-full lg:w-[calc(100%-16rem)] h-16 z-40 bg-[#0e0e0e]/60 backdrop-blur-xl flex items-center justify-between px-6 lg:px-8 border-b border-white/5">
        <div class="lg:hidden text-primary font-black italic text-xl tracking-tighter">SCHEDULE</div>
        <div class="hidden lg:flex items-center gap-2 bg-white/5 px-4 py-1.5 rounded-full border border-white/5">
            <span class="material-symbols-outlined text-gray-500 text-sm">search</span>
            <input class="bg-transparent border-none focus:ring-0 text-xs text-white w-64" placeholder="Procurar reserva..."/>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-black text-primary bg-primary/10 px-2 py-1 rounded hidden sm:block">LIVE SYNC</span>
            <div class="w-8 h-8 rounded-full border border-primary overflow-hidden">
                <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCyxXtmJ5ei2uQ_u7PW_N1Zjvfr45Z5V1eyKgIxpI8T0-KSvLHjh712_uN0ZnR9NTELj53n2kLcYOs4W5cCrIUlAtfsL0sE5CW1n_VUcI3ZQvZvlUjlndQRKlQspxYyI0CDipHLxqCIg_or3YAtmf5ZumW_FO7JxmsKkSRkpOBPr_g7tG44KYlXofMyQAxC7uFCUwNNAE-0A-PKa4AoyND8SlSOwmzDr9wdbrVEbSrIw3kWA0eqVrKhHLgsy0VcvpvmXjfGqJJYVMk" class="w-full h-full object-cover">
            </div>
        </div>
    </header>

    <main class="ml-0 lg:ml-64 pt-16 flex-1 flex flex-col overflow-hidden">
        <div class="px-4 lg:px-8 py-4 bg-surface border-b border-white/5 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto justify-between">
                <div class="flex items-center gap-2">
                    <button class="p-1 text-gray-400"><span class="material-symbols-outlined">chevron_left</span></button>
                    <span class="font-headline font-black text-sm uppercase tracking-widest">23 - 29 OUT</span>
                    <button class="p-1 text-gray-400"><span class="material-symbols-outlined">chevron_right</span></button>
                </div>
                <div class="lg:hidden flex bg-white/5 rounded-lg p-1">
                    <button class="px-3 py-1.5 text-[10px] font-black uppercase rounded bg-primary text-black">P1</button>
                    <button class="px-3 py-1.5 text-[10px] font-black uppercase rounded text-gray-500">P2</button>
                </div>
            </div>

            <div class="hidden lg:flex items-center gap-2">
                <button class="bg-white/5 px-4 py-2 rounded-lg text-[10px] font-black uppercase hover:bg-primary hover:text-black transition-all">Hoje</button>
                <div class="h-4 w-[1px] bg-white/10 mx-2"></div>
                <a href="reserva.html" class="bg-primary text-black px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/20">Novo Jogo</a>
            </div>
        </div>

        <div class="flex-1 overflow-auto no-scrollbar bg-[#0a0a0a]">
            <div class="min-w-[360px] lg:min-w-[1000px] relative flex">
                <div class="w-16 lg:w-20 flex-none bg-[#0e0e0e] border-r border-white/5 z-30">
                    <div class="time-slot flex items-start justify-center pt-4 border-b border-white/5"><span class="text-[10px] font-black text-gray-600">09:00</span></div>
                    <div class="time-slot flex items-start justify-center pt-4 border-b border-white/5"><span class="text-[10px] font-black text-gray-600">10:00</span></div>
                    <div class="time-slot flex items-start justify-center pt-4 border-b border-white/5 relative bg-primary/5">
                        <span class="text-[10px] font-black text-primary">11:00</span>
                        <div class="absolute right-0 top-0 h-full w-1 bg-primary shadow-[0_0_10px_#8eff71]"></div>
                    </div>
                </div>

                <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 relative h-fit">
                    <div class="relative min-h-screen border-r border-white/5">
                        <div class="hidden lg:flex sticky top-0 z-20 bg-[#0e0e0e]/90 backdrop-blur p-4 border-b border-white/5 items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
                            <span class="text-xs font-black uppercase tracking-widest">Speed Pitch 1</span>
                        </div>
                        <div class="absolute top-[96px] left-2 right-2 h-[90px] bg-primary/20 border-l-4 border-primary rounded-xl p-3 z-10 group cursor-pointer active:scale-95 transition-all">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-[9px] font-black text-primary uppercase mb-1">Elite League</p>
                                    <h4 class="text-xs font-bold leading-tight">Neo vs Carbon</h4>
                                </div>
                                <span class="text-[8px] font-black bg-primary text-black px-1.5 py-0.5 rounded">PAGO</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <a href="reserva.html" class="lg:hidden fixed bottom-24 right-6 w-12 h-12 bg-primary text-black rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-50">
        <span class="material-symbols-outlined font-black">bolt</span>
    </a>

</body>
</html>
